version = 4

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = ''
    trailing_diamond = ''
    template = ' {{ .Path }}'
    foreground = '#3EC669'
    background = '#29315A'
    type = 'path'
    style = 'diamond'

    [blocks.segments.options]
      style = 'mixed'

  [[blocks.segments]]
    leading_diamond = ' '
    trailing_diamond = ''
    template = ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
    foreground = '#43CCEA'
    background = '#29315A'
    type = 'git'
    style = 'diamond'
    foreground_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}', '{{ if gt .Ahead 0 }}#B388FF{{ end }}', '{{ if gt .Behind 0 }}#B388FF{{ end }}']

    [blocks.segments.options]
      branch_template = '{{ trunc 25 .Branch }}'
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    template = 'x '
    foreground = '#C94A16'
    type = 'status'
    style = 'plain'

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    template = '{{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }} {{ .Full }}'
    foreground = '#88e570'
    type = 'node'
    style = 'plain'

    [blocks.segments.options]
      bun_icon = '<#e5dbcc> bun</>'
      display_mode = 'files'
      fetch_package_manager = true
      fetch_version = true
      npm_icon = '<#e5272d> npm</> '
      pnpm_icon = '<#e5a100> pnpm</> '
      yarn_icon = '<#37aee5> yarn</> '

  [[blocks.segments]]
    template = ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#4063D8'
    type = 'crystal'
    style = 'plain'

    [blocks.segments.options]
      display_mode = 'files'
      fetch_version = true

  [[blocks.segments]]
    template = ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#DE3F24'
    type = 'ruby'
    style = 'plain'

    [blocks.segments.options]
      display_mode = 'files'
      fetch_version = true

  [[blocks.segments]]
    template = ' {{ if .Venv }} {{ .Venv }} {{ end }}{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#FED142'
    type = 'python'
    style = 'plain'

    [blocks.segments.options]
      display_mode = 'context'
      fetch_virtual_env = true

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '➜ '
    foreground = '#63F08C'
    type = 'text'
    style = 'plain'
